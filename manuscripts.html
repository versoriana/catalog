	<script>
		var CETEIcean = new CETEI();

		// Copy an entry's permalink (the link's existing href) to the clipboard,
		// with brief "Copied!" feedback on the button.
		function copyEntryLink(link) {
			const url = link.href;
			const flash = function() {
				const lbl = link.querySelector('.copy-link-label');
				if (lbl) {
					lbl.textContent = 'Copied!';
					link.classList.add('copied');
					setTimeout(function() {
						lbl.textContent = 'Copy link';
						link.classList.remove('copied');
					}, 1500);
				}
			};
			if (navigator.clipboard && navigator.clipboard.writeText) {
				navigator.clipboard.writeText(url).then(flash).catch(flash);
			} else {
				const ta = document.createElement('textarea');
				ta.value = url;
				ta.style.position = 'fixed';
				ta.style.opacity = '0';
				document.body.appendChild(ta);
				ta.select();
				try { document.execCommand('copy'); } catch (err) { /* ignore */ }
				document.body.removeChild(ta);
				flash();
			}
		}

		// Define global behaviors for all TEI elements
		let behaviors = {
          "tei": {
			 // "teiHeader": null, // No specific behavior for teiHeader
                "note": function(e) {
					const type = e.getAttribute('type');
					if (type === 'editorial' || type === 'gap') {
						const details = document.createElement('details');
						details.className = 'note-inline';
						const summary = document.createElement('summary');
						summary.textContent = 'note';
						details.appendChild(summary);
						const content = document.createElement('span');
						content.className = 'note-content';
						content.innerHTML = e.innerHTML;
						details.appendChild(content);
						return details;
					}
					let container = document.createElement('span');
					container.className = 'note-content';
					container.innerHTML = e.innerHTML;
					return container;
				},
				"persName": function(e) {
					const ref = e.getAttribute('ref');
					if (ref && ref.startsWith('#')) {
						const personId = ref.replace('#', '');
						const container = document.createElement('span');
						container.className = 'person-link';
						container.textContent = e.textContent;
						container.onclick = function() {
							window.location.href = `persons.html#${personId}`;
						};
						return container;
					}
					// Return default behavior if no ref or not starting with #
					return null;
				},
				"ref": function(e) {
					const target = e.getAttribute('target');
					if (target && target.startsWith('#')) {
						const msId    = target.slice(1);
						const linkText = e.textContent.trim() || msId;
						const link    = document.createElement('a');
						link.href     = `#${msId}`;
						link.textContent = linkText;
						link.addEventListener('click', function(evt) {
							evt.preventDefault();
							const row = document.querySelector(`#ms-table-body tr[data-id="${msId}"]`);
							if (row) {
								if (!row.classList.contains('ms-selected')) {
									row.click();
								} else {
									const y = row.getBoundingClientRect().top + window.scrollY - 80;
									window.scrollTo({ top: y, behavior: 'smooth' });
								}
							}
						});
						return link;
					}
					if (target && (target.startsWith('http://') || target.startsWith('https://'))) {
						const link = document.createElement('a');
						link.href = target;
						link.textContent = e.textContent;
						link.target = '_blank';
						link.rel = 'noopener noreferrer';
						return link;
					}
					return null;
				},
				"altIdentifier": function(e) {
					const parts = [];
					const settlement = e.querySelector('tei-settlement');
					const repository = e.querySelector('tei-repository');
					const idno = e.querySelector('tei-idno:not([type="URI"])');
					if (settlement) parts.push(settlement.textContent.trim());
					if (repository) parts.push(repository.textContent.trim());
					if (idno)       parts.push(idno.textContent.trim());
					if (!parts.length) return null;
					const span = document.createElement('span');
					span.className = 'alt-identifier';
					span.textContent = `(olim ${parts.join(', ')})`;
					// Insert inline after the main (non-URI) idno, before the URI block
					const mainIdno = e.parentElement && e.parentElement.querySelector('tei-idno:not([type="URI"])');
					if (mainIdno) {
						mainIdno.insertAdjacentElement('afterend', span);
						return document.createElement('span'); // empty placeholder at original position
					}
					return span;
				},
				"idno": function(e) {
					const type = e.getAttribute('type');
					if (type === 'URI') {
						const url = e.textContent.trim();
						
						// Create a complete new structure
						const container = document.createElement('div');
						container.className = 'uri-link-container';
						
						// Create label
						const label = document.createElement('span');
						label.className = 'uri-link-label';
						label.textContent = 'See at: ';
						
						// Create clickable link
						const link = document.createElement('a');
						link.className = 'uri-link-url';
						link.href = url;
						link.target = '_blank';
						link.textContent = url;
						
						container.appendChild(label);
						container.appendChild(link);
						
						return container;
					}
					// Return default behavior for other idno types
					return null;
				},
				"origDate": function(e) {
					const when = e.getAttribute('when');
					const from = e.getAttribute('from');
					const to = e.getAttribute('to');
					const notBefore = e.getAttribute('notBefore');
					const notAfter = e.getAttribute('notAfter');

					let shortDate = '';
					if (when) shortDate = when;
					else if (from && to) shortDate = from === to ? from : `${from}–${to}`;
					else if (from) shortDate = `from ${from}`;
					else if (to)   shortDate = `to ${to}`;
					else if (notBefore && notAfter) shortDate = `${notBefore}–${notAfter}`;
					else if (notBefore) shortDate = `after ${notBefore}`;
					else if (notAfter)  shortDate = `before ${notAfter}`;

					const container = document.createElement('span');
					container.className = 'origDate-info';
					container.dataset.short = shortDate;
					if (e.hasChildNodes()) {
						Array.from(e.childNodes).forEach(n => container.appendChild(n.cloneNode(true)));
					}
					if (!container.textContent.trim()) container.textContent = shortDate;

					return container;
				},
                "msItem": function(e) {
					const container = document.createElement("div");
					container.className = "msitem-container";

					const title    = e.querySelector("tei-title");
					const locusGrp = e.querySelector("tei-locusgrp");
					const locus    = e.querySelector("tei-locus");
					const otherElements = Array.from(e.childNodes).filter(node =>
						node.nodeName !== "TEI-TITLE" &&
						node.nodeName !== "TEI-LOCUS" &&
						node.nodeName !== "TEI-LOCUSGRP"
					);

					// Build locus text
					let locusText = "";
					if (locusGrp) {
						const boundLocus   = locusGrp.querySelector('tei-locus[scheme="#bound"]');
						const unboundLocus = locusGrp.querySelector('tei-locus[scheme="#unbound"]');
						if (boundLocus || unboundLocus) {
							if (boundLocus) {
								const from = boundLocus.getAttribute('from');
								const to   = boundLocus.getAttribute('to');
								if (from && to)   locusText = `ff. ${from}–${to}`;
								else if (from)    locusText = `f. ${from}`;
								else if (to)      locusText = `f. ${to}`;
							}
							if (unboundLocus) {
								const from = unboundLocus.getAttribute('from');
								const to   = unboundLocus.getAttribute('to');
								if (from && to)   locusText += ` [${from}–${to}]`;
								else if (from)    locusText += ` [${from}]`;
								else if (to)      locusText += ` [${to}]`;
							}
						} else {
							const parts = [];
							locusGrp.querySelectorAll('tei-locus:not([scheme])').forEach(l => {
								const from = l.getAttribute('from');
								const to   = l.getAttribute('to');
								if (from && to) parts.push(`${from}–${to}`);
								else if (from)  parts.push(from);
								else if (to)    parts.push(to);
							});
							if (parts.length) {
								const prefix = parts.length === 1 && !parts[0].includes('–') ? 'f.' : 'ff.';
								locusText = `${prefix} ${parts.join(', ')}`;
							}
						}
					} else if (locus) {
						const from = locus.getAttribute('from');
						const to   = locus.getAttribute('to');
						if (from && to)  locusText = `ff. ${from}–${to}`;
						else if (from)   locusText = `f. ${from}`;
						else             locusText = locus.textContent.trim();
					}

					// Header: title then locus inline, no "Title:" label
					const header = document.createElement("div");
					header.className = "msitem-header";
					if (title) header.appendChild(title.cloneNode(true));
					if (locusText) {
						const locusSpan = document.createElement("span");
						locusSpan.className = "msitem-locus";
						locusSpan.textContent = locusText;
						header.appendChild(locusSpan);
					}
					container.appendChild(header);

					otherElements.forEach(el => container.appendChild(el.cloneNode(true)));
					return container;
				},
      "msDesc": function(e) {
        // Create Related Manuscripts section
        const filiations = Array.from(e.querySelectorAll('tei-filiation'));
        const msRelationshipNotes = Array.from(e.querySelectorAll('tei-note[type="msRelationship"]'));

        if (filiations.length > 0 || msRelationshipNotes.length > 0) {
          // Create wrapper div for Related Manuscripts section
          const relatedMssSection = document.createElement('div');
          relatedMssSection.className = 'related-manuscripts-section';

          // Move filiation elements to the section
          filiations.forEach(filiation => {
            relatedMssSection.appendChild(filiation.cloneNode(true));
            filiation.remove();
          });

          // Move note[type="msRelationship"] elements to the section
          msRelationshipNotes.forEach(note => {
            relatedMssSection.appendChild(note.cloneNode(true));
            note.remove();
          });

          // Insert the section before tei-additional (which contains Bibliography)
          const additionalSection = e.querySelector('tei-additional');
          if (additionalSection) {
            e.insertBefore(relatedMssSection, additionalSection);
          } else {
            e.appendChild(relatedMssSection);
          }
        }

        // Entry permalink icon (top-right of card)
        const id = e.id;
        if (id) {
          const base = window.location.origin + window.location.pathname;
          const link = document.createElement('a');
          link.className = 'entry-link copy-link';
          link.href = `${base}#${id}`;
          link.title = `${base}#${id}`;
          link.innerHTML = '<i class="bi bi-link-45deg"></i><span class="copy-link-label">Copy link</span>';
          link.addEventListener('click', function(ev) {
            ev.preventDefault();
            copyEntryLink(link);
          });
          e.appendChild(link);
        }

        // Return undefined to use default rendering for msDesc itself
        return undefined;
      }
    }
  }
	  
		// Add the behaviors globally
		CETEIcean.addBehaviors(behaviors);

	  </script>
